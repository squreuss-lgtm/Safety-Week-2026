<!doctype html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#0A0F1E"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Safety Week 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════════ */
:root{
  --bg:#080E1C;--bg2:#0D1530;--surface:#0F1827;--s2:#162034;--s3:#1E2D45;
  --border:#1B3154;--border2:#243D5E;
  --teal:#00D4A8;--teal2:#00A882;--teal3:rgba(0,212,168,.12);
  --gold:#F5A623;--gold2:#E8920A;--gold3:rgba(245,166,35,.12);
  --red:#FF4757;--red2:#CC2F3E;--red3:rgba(255,71,87,.1);
  --blue:#3D8EFF;--blue2:#2970D6;
  --green:#00C985;--green2:#009C63;--green3:rgba(0,201,133,.1);
  --purple:#7C6FFF;
  --text:#EEF2FF;--dim:#7B92B5;--dim2:#4A6380;
  --r:10px;--rl:16px;--rxl:22px;
  --font-th:'Sarabun',sans-serif;
  --font-en:'Space Grotesk',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-th);overflow-x:hidden;-webkit-font-smoothing:antialiased}
#app{min-height:100vh;max-width:430px;margin:0 auto;position:relative}
/* ══ SCREENS ══ */
.screen{min-height:100vh;display:flex;flex-direction:column;animation:fadeUp .28s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* ══ NOISE TEXTURE ══ */
.screen::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;max-width:430px}
.screen>*{position:relative;z-index:1}

/* ══════════════════════════════════════════════
   FLOOR INDICATOR
══════════════════════════════════════════════ */
.floor-indicator{display:flex;gap:6px;padding:12px 16px 0;align-items:center}
.fi-dot{width:8px;height:8px;border-radius:50%}
.fi-txt{font-family:var(--font-en);font-size:10px;letter-spacing:2px;font-weight:700;text-transform:uppercase}
.fi-f1 .fi-dot{background:var(--teal)}
.fi-f1 .fi-txt{color:var(--teal)}
.fi-f2 .fi-dot{background:var(--gold)}
.fi-f2 .fi-txt{color:var(--gold)}

/* ══════════════════════════════════════════════
   LOBBY / HERO
══════════════════════════════════════════════ */
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;gap:18px;text-align:center;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,212,168,.18) 0%,transparent 70%),
             radial-gradient(ellipse 60% 40% at 80% 100%,rgba(61,142,255,.1) 0%,transparent 60%),var(--bg)}
.mascot-wrap{position:relative;width:88px;height:88px}
.mascot{font-size:72px;display:block;animation:mascotFloat 3.5s ease-in-out infinite;line-height:1}
@keyframes mascotFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
.mascot-glow{position:absolute;inset:-12px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,168,.2) 0%,transparent 70%);animation:glowPulse 3.5s ease-in-out infinite}
@keyframes glowPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
.brand{display:flex;flex-direction:column;gap:2px}
.brand-safety{font-family:var(--font-en);font-size:52px;font-weight:800;letter-spacing:6px;
  background:linear-gradient(135deg,var(--teal) 0%,#00F5D4 50%,var(--blue) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;line-height:1}
.brand-week{font-family:var(--font-en);font-size:14px;font-weight:700;letter-spacing:5px;color:var(--dim);margin-top:2px}
.brand-sub{font-size:13px;color:var(--dim);line-height:1.5;max-width:260px}
.hero-stats{display:flex;gap:10px;justify-content:center;width:100%}
.hs{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 0;display:flex;flex-direction:column;align-items:center;flex:1;gap:1px}
.hs-n{font-family:var(--font-en);font-size:22px;font-weight:800;color:var(--gold)}
.hs-l{font-size:10px;color:var(--dim);letter-spacing:.5px}
.bubble{background:var(--s2);border:1px solid var(--border2);border-radius:var(--rl);padding:11px 15px;font-size:13px;color:var(--dim);max-width:290px;line-height:1.55;position:relative}
.bubble b{color:var(--teal)}
.bubble::after{content:'▲';position:absolute;top:-8px;left:50%;transform:translateX(-50%);color:var(--s2);font-size:10px;text-shadow:0 -1px 0 var(--border2)}
/* floor selector */
.floor-cards{display:flex;flex-direction:column;gap:10px;width:100%}
.fc{border-radius:var(--rl);padding:16px;cursor:pointer;display:flex;align-items:center;gap:14px;border:1px solid transparent;transition:all .2s;position:relative;overflow:hidden}
.fc::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s}
.fc:active::before{opacity:1}
.fc-f1{background:linear-gradient(135deg,rgba(0,212,168,.1),rgba(0,212,168,.04));border-color:rgba(0,212,168,.3)}
.fc-f1::before{background:rgba(0,212,168,.08)}
.fc-f2{background:linear-gradient(135deg,rgba(245,166,35,.1),rgba(245,166,35,.04));border-color:rgba(245,166,35,.3)}
.fc-f2::before{background:rgba(245,166,35,.08)}
.fc-f2.locked{opacity:.5;cursor:default}
.fc-icon{font-size:36px;flex-shrink:0}
.fc-info{flex:1;text-align:left}
.fc-title{font-size:15px;font-weight:800;margin-bottom:3px}
.fc-sub{font-size:11px;color:var(--dim);line-height:1.4}
.fc-f1 .fc-title{color:var(--teal)}
.fc-f2 .fc-title{color:var(--gold)}
.fc-badge{font-size:10px;padding:3px 9px;border-radius:99px;font-weight:700;white-space:nowrap;flex-shrink:0}
.fc-f1 .fc-badge{background:rgba(0,212,168,.15);color:var(--teal)}
.fc-f2 .fc-badge{background:rgba(245,166,35,.15);color:var(--gold)}
.fc-lock{font-size:18px;flex-shrink:0}
.prog-bar-wrap{width:100%;background:var(--s2);border-radius:99px;height:3px;margin-top:6px;overflow:hidden}
.prog-bar{height:100%;border-radius:99px;transition:width .5s}
.fc-f1 .prog-bar{background:linear-gradient(90deg,var(--teal2),var(--teal))}
.fc-f2 .prog-bar{background:linear-gradient(90deg,var(--gold2),var(--gold))}
/* total stars */
.total-stars{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:var(--dim);padding:4px 0}
.ts-num{font-family:var(--font-en);font-size:18px;font-weight:700;color:var(--gold)}

/* ══════════════════════════════════════════════
   FLOOR TRANSITION
══════════════════════════════════════════════ */
.ftrans{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:20px;text-align:center}
.ftrans-icon{font-size:80px;animation:mascotFloat 2s ease-in-out infinite}
.ftrans-title{font-family:var(--font-en);font-size:26px;font-weight:800;color:var(--gold)}
.ftrans-sub{font-size:14px;color:var(--dim);line-height:1.6;max-width:280px}
.ftrans-levels{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:4px 0}
.ftl{background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--dim)}
.ftrans-unlock{background:linear-gradient(135deg,rgba(245,166,35,.15),rgba(255,71,87,.08));border:1px solid rgba(245,166,35,.4);border-radius:var(--rl);padding:14px 18px;font-size:13px;color:var(--gold);font-weight:700}

/* ══════════════════════════════════════════════
   MAP SCREEN
══════════════════════════════════════════════ */
.map-screen{background:var(--bg)}
.map-top{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.map-back{background:transparent;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:4px;line-height:1;flex-shrink:0}
.map-title{flex:1;font-size:15px;font-weight:800}
.map-stars{font-family:var(--font-en);font-size:13px;font-weight:700;color:var(--gold)}
.map-body{padding:14px 16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
/* stamp card */
.stamp-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);padding:14px}
.stamp-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.stamp-hdr-l{font-size:12px;font-weight:700;color:var(--dim);letter-spacing:.5px}
.stamp-stars{font-family:var(--font-en);font-size:13px;font-weight:700;color:var(--gold)}
.stamp-row{display:flex;gap:5px;margin-bottom:10px}
.stamp-slot{flex:1;aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;border:1px dashed var(--border2);background:var(--bg2);transition:all .3s;min-width:0}
.stamp-slot.earned{border-style:solid;animation:stampPop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes stampPop{0%{transform:scale(0) rotate(-10deg)}100%{transform:scale(1) rotate(0)}}
.stamp-slot .sn{font-size:9px;color:var(--dim2)}
.stamp-prog{height:4px;background:var(--bg2);border-radius:99px;overflow:hidden}
.stamp-prog-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.34,1.2,.64,1)}
/* level grid */
.lvl-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.lvl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:13px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;text-align:left}
.lvl-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--lc,var(--border))}
.lvl-card:active{transform:scale(.97);background:var(--s2)}
.lvl-card.done{border-color:var(--border2)}
.lc-top{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.lc-icon{font-size:22px}.lc-num{font-family:var(--font-en);font-size:10px;font-weight:700;color:var(--dim2);background:var(--s2);padding:2px 6px;border-radius:4px}
.lc-check{margin-left:auto;font-size:12px}
.lc-title{font-size:12px;font-weight:800;line-height:1.3;margin-bottom:4px;color:var(--text)}
.lc-zone{font-size:10px;color:var(--dim2);margin-bottom:5px}
.lc-meta{display:flex;align-items:center;gap:5px}
.lc-timer{font-size:10px;color:var(--teal);font-weight:700}
.lc-stars-earned{font-size:11px}

/* ══════════════════════════════════════════════
   PLAY SCREEN
══════════════════════════════════════════════ */
.play-screen{background:var(--bg)}
.play-hdr{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);border-top:3px solid var(--lc,var(--teal))}
.play-back{background:transparent;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:4px;line-height:1}
.play-title{flex:1;font-size:13px;font-weight:800;display:flex;align-items:center;gap:7px}
.play-zone{font-size:10px;color:var(--dim2);text-align:right;max-width:90px;line-height:1.3}
.bot-bar{margin:10px 14px 0;background:rgba(0,212,168,.07);border:1px solid rgba(0,212,168,.2);border-radius:var(--r);padding:9px 13px;display:flex;gap:8px;align-items:flex-start}
.bot-face{font-size:20px;flex-shrink:0;margin-top:-1px}
.bot-bar p{font-size:12px;color:var(--dim);line-height:1.5}
.bot-bar b{color:var(--teal)}
.mech-wrap{padding:13px 14px;flex:1;display:flex;flex-direction:column;gap:10px}
/* ── scene card ── */
.scene{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);padding:14px;display:flex;flex-direction:column;gap:11px}
.msg{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;font-size:13px;color:var(--dim);line-height:1.55}
.msg b{color:var(--teal)}
/* timer */
.tmr-box{text-align:center;font-family:var(--font-en);font-weight:800;font-size:22px;padding:8px;border-radius:var(--r);background:var(--s2);border:1px solid var(--border2);transition:all .3s;letter-spacing:2px}
.tmr-box.warn{background:var(--red3);border-color:var(--red2);color:var(--red);animation:tmrPulse .4s ease-in-out infinite alternate}
@keyframes tmrPulse{from{box-shadow:none}to{box-shadow:0 0 16px rgba(255,71,87,.35)}}
/* dots progress */
.dot-row{display:flex;gap:5px;justify-content:center}
.dot{width:10px;height:10px;border-radius:50%;background:var(--border2);transition:all .3s}
.dot.on{background:var(--teal);box-shadow:0 0 6px var(--teal)}
.dot.on.gold{background:var(--gold);box-shadow:0 0 6px var(--gold)}

/* ══ BUTTONS ══ */
.btn{background:var(--teal);color:#000;font-family:var(--font-th);font-size:14px;font-weight:700;padding:12px 18px;border:none;border-radius:var(--r);cursor:pointer;width:100%;transition:transform .15s;letter-spacing:.3px}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.42;cursor:not-allowed}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-family:var(--font-th);font-size:14px;font-weight:700;padding:12px 18px;border:none;border-radius:var(--r);cursor:pointer;width:100%;transition:transform .15s;box-shadow:0 4px 18px rgba(245,166,35,.25)}
.btn-gold:active{transform:scale(.97)}
.btn-start{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#000;font-family:var(--font-th);font-size:16px;font-weight:800;padding:15px 40px;border:none;border-radius:var(--rl);cursor:pointer;box-shadow:0 6px 24px rgba(0,212,168,.3);width:100%;max-width:280px;transition:transform .15s;letter-spacing:.5px}
.btn-start:active{transform:scale(.97)}
.btn-sec{background:transparent;color:var(--dim);border:1px solid var(--border2);font-family:var(--font-th);font-size:13px;padding:10px 18px;border-radius:var(--r);cursor:pointer;width:100%;transition:all .15s}
.btn-warn{background:var(--red);color:#fff;border:none;padding:11px;border-radius:var(--r);cursor:pointer;font-family:var(--font-th);font-weight:700;width:100%}
.btn-next{background:var(--teal);color:#000;border:none;padding:11px 18px;border-radius:var(--r);cursor:pointer;font-family:var(--font-th);font-weight:700;margin-top:10px;width:100%}
.btn-back-lob{background:transparent;color:var(--dim2);border:1px solid var(--border);font-family:var(--font-th);font-size:12px;padding:8px 14px;border-radius:var(--r);cursor:pointer;width:100%;transition:all .15s}

/* ══════════════════════════════════════════════
   MECHANIC COMPONENTS
══════════════════════════════════════════════ */
/* bag floor */
.bag-floor{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:12px;background:var(--bg2);border-radius:var(--r);min-height:76px}
.bi{font-size:30px;cursor:pointer;position:relative;padding:4px;border:2px solid transparent;border-radius:10px;transition:all .2s}
.bi.blk{animation:biWobble 2.2s ease-in-out infinite}
.bi.placed{opacity:.38;cursor:default}
.bi:not(.placed):active{border-color:var(--gold);background:var(--gold3)}
@keyframes biWobble{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
.dng{position:absolute;top:-4px;right:-5px;font-size:11px}
.npc-txt{font-size:12px;color:var(--red);width:100%;text-align:center;font-weight:700}
/* trash */
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ti{background:var(--bg2);border:2px solid transparent;border-radius:var(--r);padding:8px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;transition:all .18s;font-family:var(--font-th)}
.ti:disabled{cursor:default}
.ti.sel{border-color:var(--gold);background:var(--gold3);transform:scale(1.04)}
.ti.ok{background:var(--green3);border-color:var(--green2)}
.ti.no{background:var(--red3);border-color:var(--red2)}
.tic{font-size:22px}.tin{font-size:10px;color:var(--dim);text-align:center;line-height:1.2}
.tres{position:absolute;top:2px;right:3px;font-size:11px}
.bin-pop{background:var(--s2);border:1px solid var(--gold);border-radius:var(--rl);padding:12px;animation:fadeUp .2s}
.bin-pop p{font-size:13px;margin-bottom:9px;text-align:center}
.bins-row{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.bin-btn{background:var(--surface);border:2px solid transparent;border-radius:var(--r);padding:10px 8px;cursor:pointer;font-family:var(--font-th);font-size:12px;font-weight:700;color:var(--text);transition:all .15s;text-align:center}
.bin-btn:active{transform:scale(.95);opacity:.85}
/* path choice */
.path-row{display:flex;flex-direction:column;gap:10px}
.pbtn{background:var(--s2);border:1px solid var(--border2);border-radius:var(--rl);padding:15px;cursor:pointer;color:var(--text);text-align:left;display:flex;align-items:center;gap:13px;font-family:var(--font-th);font-size:13px;transition:all .18s}
.pbtn:active{transform:scale(.98);border-color:var(--teal)}
.pbtn strong{font-size:15px;display:block;margin-bottom:2px}
.pbtn span{font-size:11px;color:var(--dim)}
.pbtn-el{border-left:3px solid var(--blue)}.pbtn-es{border-left:3px solid var(--teal)}
/* match list */
.mlist,.slist{display:flex;flex-direction:column;gap:7px}
.mi,.ss{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:11px 13px;cursor:pointer;color:var(--text);font-family:var(--font-th);font-size:13px;text-align:left;display:flex;align-items:center;gap:9px;transition:all .18s;width:100%}
.mi.sel,.ss.nxt{border-color:var(--teal);background:var(--teal3)}
.ss.dn{border-color:var(--green2);background:var(--green3);color:var(--green);cursor:default}
.ss.lk{opacity:.38;cursor:not-allowed}
.step-n{background:var(--s3);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--font-en);font-weight:700;flex-shrink:0;color:var(--dim)}
/* beh list */
.beh-list{display:flex;flex-direction:column;gap:7px}
.beh-row{display:flex;align-items:center;gap:8px;background:var(--bg2);border-radius:var(--r);padding:9px 11px}
.beh-ico{font-size:18px;flex-shrink:0}.beh-txt{flex:1;font-size:12px;color:var(--text)}
.beh-btns{display:flex;gap:5px;flex-shrink:0}
.bsm{padding:5px 8px;border-radius:7px;border:1px solid var(--border2);background:var(--s2);color:var(--dim2);font-size:10px;cursor:pointer;transition:all .15s;font-family:var(--font-th)}
.bsm.d.act{background:var(--red3);border-color:var(--red2);color:var(--red)}
.bsm.s.act{background:var(--green3);border-color:var(--green2);color:var(--green)}
/* platform */
.track-box{background:var(--red3);border:1px solid var(--red2);border-radius:var(--r);padding:9px 12px;font-size:13px;color:var(--red);font-weight:700;text-align:center}
.npc-warn{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:11px 13px;cursor:pointer;color:var(--text);font-family:var(--font-th);font-size:12px;text-align:left;width:100%;transition:all .18s;display:block;margin-bottom:6px}
.npc-warn.warned{border-color:var(--green2);background:var(--green3);color:var(--green)}
.ab-box{display:flex;flex-direction:column;gap:8px}
.ab-q{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:2px}
.ab-btn{padding:13px 15px;border-radius:var(--r);cursor:pointer;font-family:var(--font-th);font-size:13px;font-weight:700;border:2px solid transparent;transition:all .18s;text-align:left;width:100%;background:var(--bg2)}
.ab-btn.c{background:var(--green3);border-color:var(--green2);color:var(--green)}
.ab-btn.w{background:var(--red3);border-color:var(--red2);color:var(--red)}
/* passenger */
.pass-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.pi{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:12px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;font-family:var(--font-th);color:var(--text);position:relative;transition:all .18s}
.pi.ct{border-color:var(--red2);background:var(--red3);cursor:default}
.pi.gd{border-color:var(--green2);opacity:.5;cursor:default}
.pi-ic{font-size:26px}.pi-bh{font-size:10px;text-align:center;color:var(--dim);line-height:1.3}
.caught-tag{position:absolute;top:4px;right:4px;background:var(--red);color:#fff;font-size:9px;padding:2px 5px;border-radius:99px;font-weight:700}
/* sign match */
.sign-list{display:flex;flex-direction:column;gap:8px}
.sign-row{display:flex;flex-direction:column;gap:5px;background:var(--bg2);border-radius:var(--r);padding:9px 11px}
.sign-sym{font-size:12px;font-weight:700;color:var(--text)}
.sign-sel{background:var(--s3);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:8px 10px;font-family:var(--font-th);font-size:12px;width:100%;cursor:pointer}
/* fire */
.fire-box{background:var(--red3);border:1px solid var(--red2);border-radius:var(--r);padding:11px;text-align:center;font-size:14px;color:var(--red);font-weight:700;animation:fireFlk 1s ease-in-out infinite alternate}
@keyframes fireFlk{from{opacity:.8}to{opacity:1}}
.fire-alert{background:var(--red3);border:1px solid var(--red2);border-radius:var(--r);padding:10px;font-size:13px;color:var(--red);font-weight:700;text-align:center;animation:tmrPulse .8s ease-in-out infinite alternate}
.nevac{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:12px 14px;cursor:pointer;color:var(--text);font-family:var(--font-th);font-size:13px;font-weight:700;text-align:left;width:100%;transition:all .18s;margin-bottom:6px;display:block}
.nevac.out{border-color:var(--green2);background:var(--green3);color:var(--green)}
.exit-sign{text-align:center;font-size:15px;color:var(--green);font-weight:700;letter-spacing:3px;padding:8px;background:var(--green3);border-radius:var(--r)}
/* cpr */
.patient{text-align:center;font-size:20px;padding:6px;color:var(--gold);animation:tmrPulse 1.5s ease-in-out infinite alternate;font-weight:700}
.cpr-prog-wrap{background:var(--border);border-radius:99px;height:8px;overflow:hidden}
.cpr-prog{background:linear-gradient(90deg,var(--teal),var(--gold));height:100%;border-radius:99px;transition:width .3s}
/* disaster */
.shake-box{background:var(--red3);border:1px solid var(--red2);border-radius:var(--r);padding:12px;text-align:center;font-size:14px;font-weight:700;color:var(--gold);animation:shakeAnim .35s ease-in-out infinite}
@keyframes shakeAnim{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px) rotate(-.5deg)}75%{transform:translateX(3px) rotate(.5deg)}}
.dch-display{background:var(--s2);border-radius:var(--rl);padding:18px;display:flex;flex-direction:column;align-items:center;gap:10px}
.dch-ic{font-size:44px}.dch-lb{font-size:16px;font-weight:700;color:var(--gold)}
.dch-dots{display:flex;gap:9px}
.dch-dot{width:10px;height:10px;border-radius:50%;background:var(--border2)}.dch-dot.a{background:var(--teal)}
/* quiz */
.q-hdr{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--dim)}
.q-prog{font-family:var(--font-en);font-weight:700;color:var(--gold)}
.q-q{background:var(--s2);border-radius:var(--r);padding:14px;font-size:15px;font-weight:700;line-height:1.55;border:1px solid var(--border2)}
.q-chs{display:flex;flex-direction:column;gap:7px}
.q-ch{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:12px 13px;cursor:pointer;color:var(--text);font-family:var(--font-th);font-size:13px;text-align:left;display:flex;align-items:center;gap:9px;transition:all .18s;width:100%}
.q-ch:disabled{cursor:default}
.q-ch.ok{border-color:var(--green2);background:var(--green3);color:var(--green)}
.q-ch.no{border-color:var(--red2);background:var(--red3);color:var(--red)}
.q-let{background:var(--s3);border-radius:50%;width:23px;height:23px;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--font-en);font-weight:700;flex-shrink:0;color:var(--dim)}
.q-exp{background:rgba(0,212,168,.06);border:1px solid rgba(0,212,168,.2);border-radius:var(--r);padding:13px;font-size:12px;color:var(--dim);line-height:1.55}
.q-exp b{color:var(--teal)}

/* ══════════════════════════════════════════════
   COMPLETE / REWARD SCREENS
══════════════════════════════════════════════ */
.result-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;gap:16px;text-align:center}
.res-msc{font-size:68px;animation:mascotFloat 2s ease-in-out infinite}
.res-title{font-family:var(--font-en);font-size:24px;font-weight:800;color:var(--teal)}
.res-stars{font-size:28px;letter-spacing:4px;min-height:32px}
.res-name{font-size:15px;color:var(--dim);line-height:1.4}
.res-prog{font-size:13px;color:var(--dim2)}
.res-actions{display:flex;flex-direction:column;gap:8px;width:100%;max-width:300px}
/* floor complete banner */
.floor-complete{background:linear-gradient(135deg,var(--gold3),rgba(255,71,87,.06));border:1px solid var(--gold);border-radius:var(--rl);padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;max-width:300px}
.floor-complete h3{font-size:16px;font-weight:800;color:var(--gold)}
.floor-complete p{font-size:12px;color:var(--dim);line-height:1.5}
/* final */
.final-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;gap:16px;text-align:center;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(245,166,35,.2),transparent 60%),
             radial-gradient(ellipse 60% 40% at 20% 100%,rgba(255,71,87,.1),transparent 50%),var(--bg)}
.final-trophy{font-size:88px;animation:mascotFloat 2s ease-in-out infinite;filter:drop-shadow(0 8px 32px rgba(245,166,35,.4))}
.final-title{font-family:var(--font-en);font-size:30px;font-weight:800;color:var(--gold);text-shadow:0 0 30px rgba(245,166,35,.4)}
.final-stars{display:flex;flex-wrap:wrap;justify-content:center;gap:3px;font-size:18px;max-width:280px;line-height:1.6}
.final-total{font-family:var(--font-en);font-size:32px;font-weight:800;color:var(--gold)}
.final-desc{font-size:13px;color:var(--dim);line-height:1.6;max-width:270px}
.reward-cards{display:flex;gap:9px;width:100%;max-width:310px}
.rcard{flex:1;background:var(--s2);border:1px solid var(--border2);border-radius:var(--rl);padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center}
.rcard-ic{font-size:28px}
.rcard-t{font-size:11px;font-weight:700;color:var(--gold)}
.rcard-s{font-size:10px;color:var(--dim2);line-height:1.3}
/* ok badge */
.ok-badge{display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;color:var(--green);padding:6px;font-weight:700}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ════════════════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════════════════
const FLOOR1_IDS=[1,2,3,7,8];
const FLOOR2_IDS=[4,5,6,9];

const LEVELS={
  1:{id:1,title:'ความปลอดภัยของสัมภาระ',en:'Baggage Safety',zone:'Zone A',icon:'🧳',color:'#F5A623',timer:30,desc:'หยิบกระเป๋า 5 ใบที่วางผิดจุด + แจ้งกระเป๋าต้องสงสัย ภายใน 30 วินาที',stars:1,floor:1},
  2:{id:2,title:'สิ่งแวดล้อมและขยะ',en:'Environment Safety',zone:'Zone B',icon:'♻️',color:'#00C985',timer:45,desc:'โยนขยะ 12 ชิ้นลงถัง 4 ประเภท ต้องถูก 8/12 จึงผ่าน',stars:1,floor:1},
  3:{id:3,title:'ขึ้นชั้นชานชาลา',en:'Floor Access',zone:'Zone C',icon:'🏢',color:'#3D8EFF',timer:null,desc:'เลือกลิฟท์ หรือบันไดเลื่อน แต่ละทางมีเกมส์ต่างกัน',stars:1,floor:1},
  7:{id:7,title:'CPR & AED',en:'First Aid',zone:'Zone G',icon:'🏥',color:'#3D8EFF',timer:null,desc:'ทำ CPR 30:2 และใช้ AED ตามขั้นตอน 4 ขั้น',stars:1,floor:1},
  8:{id:8,title:'การรับมือภัยพิบัติ',en:'Disaster',zone:'Zone H',icon:'⚡',color:'#FF4757',timer:10,desc:'ทำท่า Drop-Cover-Hold และระบุสัญญาณภัยพิบัติ 4 แบบ',stars:1,floor:1},
  4:{id:4,title:'ความปลอดภัยบนชานชาลา',en:'Platform Safety',zone:'Zone D',icon:'🚉',color:'#F5A623',timer:30,desc:'แจ้งเตือน NPC 3 คนที่ชิดขอบ และตัดสินใจ A/B เมื่อของตกราง',stars:2,floor:2},
  5:{id:5,title:'บนรถไฟ',en:'On Board',zone:'Zone E',icon:'🚆',color:'#00D4A8',timer:null,desc:'จับผิด NPC ที่ปฏิบัติตัวผิดกฎ และจับคู่สัญลักษณ์ 5 แบบ',stars:2,floor:2},
  6:{id:6,title:'ออกจากรถไฟ & อัคคีภัย',en:'Fire & Evacuation',zone:'Zone F',icon:'🔥',color:'#FF4757',timer:60,desc:'ดับไฟเล็กด้วยถังดับเพลิง PASS แล้วนำ NPC 3 คนออกทางฉุกเฉิน',stars:2,floor:2},
  9:{id:9,title:'ทดสอบความรู้ความปลอดภัย',en:'Safety Quiz',zone:'Zone I',icon:'🎓',color:'#7C6FFF',timer:null,desc:'ตอบคำถาม 9 ข้อครอบคลุมทุกด่าน ต้องผ่าน 7/9 ข้อ',stars:3,floor:2}
};

const QUIZ_DATA=[
  {q:'เมื่อพบกระเป๋าไม่มีเจ้าของในสถานี ควรทำอย่างไร?',ch:['เปิดกระเป๋าดูว่ามีอะไร','แจ้งเจ้าหน้าที่ทันที','นำไปฝากที่เคาน์เตอร์','ทิ้งไว้ก่อน'],a:1,e:'กระเป๋าไม่มีเจ้าของอาจเป็นวัตถุอันตราย ต้องแจ้งเจ้าหน้าที่ทันทีโดยไม่แตะต้อง'},
  {q:'ขยะประเภทใดต้องทิ้งในถังอันตราย (สีแดง)?',ch:['เปลือกผลไม้','ขวดพลาสติก','ถ่านไฟฉาย / แบตเตอรี่','กระดาษ'],a:2,e:'ถ่านและแบตเตอรี่มีสารเคมีอันตราย ต้องแยกทิ้งในถังขยะอันตราย'},
  {q:'หากติดอยู่ในลิฟท์ที่หยุดกะทันหัน ควรทำอย่างไร?',ch:['พยายามงัดประตูออกเอง','กดปุ่มฉุกเฉินและรอความช่วยเหลือ','กระโดดให้ลิฟท์เคลื่อน','ตะโกนอย่างเดียว'],a:1,e:'กดปุ่ม Emergency → ใช้อินเตอร์คอม → นั่งลง → รอ ห้ามงัดประตูเด็ดขาด'},
  {q:'หากของตกลงไปบนรางรถไฟ ควรทำอย่างไร?',ch:['กระโดดลงไปหยิบเร็วๆ','ขอให้คนอื่นช่วยลงไปหยิบ','กดปุ่มฉุกเฉินและแจ้งเจ้าหน้าที่','รอให้รถไฟผ่านก่อน'],a:2,e:'ห้ามลงไปในรางรถไฟเด็ดขาด! กดปุ่มฉุกเฉินสีแดงและแจ้งเจ้าหน้าที่ทันที'},
  {q:'บนรถไฟ หากต้องการความช่วยเหลือฉุกเฉิน ต้องทำอย่างไร?',ch:['ดึง Emergency Brake ทันที','กดปุ่มขอความช่วยเหลือในตู้โดยสาร','เปิดประตูตู้ด้วยตนเอง','รอให้รถไฟจอดสถานีถัดไป'],a:1,e:'กดปุ่มขอความช่วยเหลือ ห้ามดึง Emergency Brake โดยพลการ'},
  {q:'ขั้นตอนการใช้ถังดับเพลิงแบบ PASS คือ?',ch:['Push-Aim-Spray-Sweep','Pull-Aim-Squeeze-Sweep','Press-Angle-Spray-Stop','Pull-Attack-Spray-Safe'],a:1,e:'PASS: Pull ดึงสลัก → Aim เล็ง → Squeeze บีบ → Sweep กวาดฐานไฟ'},
  {q:'อัตราส่วน CPR ผู้ใหญ่คือ?',ch:['15:1','30:2','15:2','20:2'],a:1,e:'CPR ผู้ใหญ่: กดหน้าอก 30 ครั้ง : เป่าปาก 2 ครั้ง อัตราเร็ว 100-120 ครั้ง/นาที'},
  {q:'เมื่อเกิดแผ่นดินไหวอยู่ในอาคาร ควรทำอย่างไรก่อน?',ch:['วิ่งออกจากอาคารทันที','Drop-Cover-Hold ใต้โต๊ะแข็งแรง','ยืนชิดประตู','วิ่งหาบันไดฉุกเฉิน'],a:1,e:'Drop ลงพื้น → Cover หัวใต้โต๊ะ → Hold ยึดจนสั่นหยุด'},
  {q:'เบอร์โทรฉุกเฉินรถไฟฟ้า MRT คือ?',ch:['191','1554','199','1669'],a:1,e:'1554 คือสายด่วน MRT สำหรับแจ้งเหตุฉุกเฉิน ตลอด 24 ชั่วโมง'}
];

// ════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════
var S={
  view:'LOBBY', // LOBBY|FLOOR_TRANS|MAP|PLAY|COMPLETE|FINAL
  activeFloor:1,
  curLevel:null,
  done:new Set(),
  stars:{},      // levelId -> stars earned
  lastResult:null
};

function loadState(){
  try{
    var d=JSON.parse(localStorage.getItem('sw2026')||'null');
    if(d){
      S.done=new Set(d.done||[]);
      S.stars=d.stars||{};
    }
  }catch(e){}
}
function saveState(){
  try{localStorage.setItem('sw2026',JSON.stringify({done:[...S.done],stars:S.stars}));}catch(e){}
}
loadState();

function totalStars(){
  var t=0;
  Object.values(S.stars).forEach(function(s){t+=s;});
  return t;
}
function floorDone(f){
  var ids=f===1?FLOOR1_IDS:FLOOR2_IDS;
  return ids.filter(function(id){return S.done.has(id);}).length;
}
function floor1Unlocked(){return true;}
function floor2Unlocked(){return floorDone(1)>=3;}

// timer
var _tmr=null, _tl=0;
function startTimer(s,cb){
  clearInterval(_tmr);_tl=s;
  _tmr=setInterval(function(){
    _tl--;
    var el=document.getElementById('tmr-display');
    if(el){
      var m=Math.floor(_tl/60),sec=_tl%60;
      el.textContent=(_tl>=60?m+':'+('0'+sec).slice(-2):_tl)+'s';
      if(_tl<=5)el.classList.add('warn');else el.classList.remove('warn');
    }
    if(_tl<=0){clearInterval(_tmr);if(cb)cb();}
  },1000);
}
function stopTimer(){clearInterval(_tmr);}

function levelComplete(stars,passed){
  stopTimer();
  if(!passed){
    // failed — show try again
    S.view='COMPLETE';
    S.lastResult={passed:false,levelId:S.curLevel,stars:0};
    render();return;
  }
  S.done.add(S.curLevel);
  S.stars[S.curLevel]=Math.max(S.stars[S.curLevel]||0,stars);
  saveState();
  S.lastResult={passed:true,levelId:S.curLevel,stars:stars};
  // check all done
  var allDone=S.done.size>=9;
  if(allDone){S.view='FINAL';}else{S.view='COMPLETE';}
  render();
}

// ════════════════════════════════════════════════════════════════
// RENDER ROUTER
// ════════════════════════════════════════════════════════════════
function render(){
  var a=document.getElementById('app');
  if(S.view==='LOBBY')a.innerHTML=renderLobby();
  else if(S.view==='FLOOR_TRANS')a.innerHTML=renderFloorTrans();
  else if(S.view==='MAP')a.innerHTML=renderMap();
  else if(S.view==='PLAY')a.innerHTML=renderPlay();
  else if(S.view==='COMPLETE')a.innerHTML=renderComplete();
  else if(S.view==='FINAL')a.innerHTML=renderFinal();
}

// ════════════════════════════════════════════════════════════════
// LOBBY
// ════════════════════════════════════════════════════════════════
function renderLobby(){
  var f1d=floorDone(1), f2d=floorDone(2);
  var f2locked=!floor2Unlocked();
  var ts=totalStars();
  return '<div class="screen" style="background:var(--bg)">'+
    '<div class="hero">'+
      '<div class="mascot-wrap"><span class="mascot">🤖</span><div class="mascot-glow"></div></div>'+
      '<div class="bubble"><b>Safety Bot</b> พร้อมแล้ว!<br>เลือกชั้นที่ต้องการเรียนรู้ความปลอดภัย</div>'+
      '<div class="brand"><span class="brand-safety">SAFETY</span><span class="brand-week">WEEK 2026</span></div>'+
      '<p class="brand-sub">VR Safety Game — ระบบขนส่งสาธารณะ</p>'+
      '<div class="hero-stats">'+
        '<div class="hs"><span class="hs-n">9</span><span class="hs-l">ด่าน</span></div>'+
        '<div class="hs"><span class="hs-n">15</span><span class="hs-l">ดาว</span></div>'+
        '<div class="hs"><span class="hs-n">2</span><span class="hs-l">รางวัล</span></div>'+
      '</div>'+
      (ts>0?'<div class="total-stars">⭐ รวมสะสมแล้ว <span class="ts-num">'+ts+'</span> / 15 ดาว</div>':'')+
      '<div class="floor-cards">'+
        // Floor 1
        '<div class="fc fc-f1" onclick="goFloor(1)">'+
          '<span class="fc-icon">🏢</span>'+
          '<div class="fc-info">'+
            '<div class="fc-title">ชั้น 1 — Basic Safety</div>'+
            '<div class="fc-sub">สัมภาระ • ขยะ • ลิฟท์/บันได<br>CPR & AED • ภัยพิบัติ</div>'+
            '<div class="prog-bar-wrap"><div class="prog-bar" style="width:'+Math.round(f1d/5*100)+'%"></div></div>'+
          '</div>'+
          '<span class="fc-badge">'+f1d+'/5 ด่าน</span>'+
        '</div>'+
        // Floor 2
        '<div class="fc fc-f2'+(f2locked?' locked':'')+'" onclick="'+(f2locked?'showLockMsg()':'goFloor(2)')+'">'+
          '<span class="fc-icon">🚆</span>'+
          '<div class="fc-info">'+
            '<div class="fc-title">ชั้น 2 — Advanced Safety</div>'+
            '<div class="fc-sub">ชานชาลา • บนรถไฟ<br>อัคคีภัย • Quiz สุดท้าย</div>'+
            '<div class="prog-bar-wrap"><div class="prog-bar" style="width:'+Math.round(f2d/4*100)+'%"></div></div>'+
          '</div>'+
          (f2locked?'<span class="fc-lock">🔒</span>':'<span class="fc-badge">'+f2d+'/4 ด่าน</span>')+
        '</div>'+
      '</div>'+
      (S.done.size>0?'<button class="btn-sec" onclick="resetAll()">🔄 เริ่มใหม่ทั้งหมด</button>':'')+
    '</div>'+
  '</div>';
}

function goFloor(f){
  S.activeFloor=f;
  S.view='FLOOR_TRANS';
  render();
}
function showLockMsg(){
  alert('🔒 ผ่านชั้น 1 อย่างน้อย 3 ด่านก่อน เพื่อปลดล็อกชั้น 2!');
}
function resetAll(){
  if(!confirm('ยืนยันเริ่มใหม่ทั้งหมด?'))return;
  S={view:'LOBBY',activeFloor:1,curLevel:null,done:new Set(),stars:{},lastResult:null};

function renderStampCard(floor){
  var ids=floor===1?FLOOR1_IDS:FLOOR2_IDS;
  var maxS=floor===1?5:10;
  var earnedS=ids.reduce(function(a,id){return a+(S.stars[id]||0);},0);
  var slots=ids.map(function(id){
    var lv=LEVELS[id];
    var earned=S.done.has(id);
    var starsEarned=S.stars[id]||0;
    return '<div class="stamp-slot '+(earned?'earned':'')+'" style="'+(earned?'border-color:'+lv.color+';background:'+lv.color+'22;color:'+lv.color:'')+'" title="'+lv.title+'">'+
      (earned?lv.icon:'<span class="sn">'+id+'</span>')+
    '</div>';
  }).join('');
  var pct=Math.round(earnedS/maxS*100);
  var color=floor===1?'var(--teal)':'linear-gradient(90deg,var(--gold2),var(--gold))';
  return '<div class="stamp-card">'+
    '<div class="stamp-hdr"><span class="stamp-hdr-l">🎫 STAMP CARD — FLOOR '+floor+'</span><span class="stamp-stars">⭐ '+earnedS+'/'+(floor===1?5:10)+' ดาว</span></div>'+
    '<div class="stamp-row">'+slots+'</div>'+
    '<div class="stamp-prog"><div class="stamp-prog-fill" style="width:'+pct+'%;background:'+color+'"></div></div>'+
  '</div>';
}

function renderMap(){
  var f=S.activeFloor;

    return '<div class="lvl-card '+(done?'done':'')+'" style="--lc:'+lv.color+'" onclick="playLevel('+id+')">'+
      '<div class="lc-top"><span class="lc-icon">'+lv.icon+'</span><span class="lc-num">ด่าน '+id+'</span>'+(done?'<span class="lc-check">✅</span>':'')+
        (done?'<span class="lc-stars-earned" style="margin-left:auto">'+Array(st).fill('⭐').join('')+'</span>':'')+
      '</div>'+
      '<div class="lc-title">'+lv.title+'</div>'+
      '<div class="lc-zone">'+lv.zone+'</div>'+
      '<div class="lc-meta">'+
        (lv.timer?'<span class="lc-timer">⏱ '+lv.timer+'s</span>':'<span style="font-size:10px;color:var(--dim2)">📚 ไม่มีเวลา</span>')+
      '</div>'+

    '<div class="map-top">'+

      '<span class="map-title" style="color:'+colorAccent+'">🗺️ '+(f===1?'ชั้น 1 — Basic Safety':'ชั้น 2 — Advanced Safety')+'</span>'+
      '<span class="map-stars">⭐ '+totalStars()+'/15</span>'+

    '<div class="map-body">'+
      renderStampCard(f)+

}
function m5phase2(){
  document.getElementById('m5sc').innerHTML='<div class="msg">🤖 จับคู่สัญลักษณ์กับความหมาย!</div>'+
    '<div class="sign-list">'+SD.map(function(s,i){return '<div class="sign-row"><div class="sign-sym">'+s.s+'</div><select class="sign-sel" id="sg'+i+'" onchange="m5ans('+i+',this.value)"><option value="">เลือกความหมาย...</option>'+SD.map(function(m,j){return '<option value="'+j+'">'+m.m+'</option>';}).join('')+'</select></div>';}).join('')+'</div>'+
    '<button class="btn" onclick="m5submit()">✅ ยืนยันคำตอบ</button>';
}
function m5ans(i,v){window._m5.sa[i]=v===''?null:Number(v);}
function m5submit(){var c=window._m5.sa.filter(function(a,i){return a===i;}).length;levelComplete(2,c>=4);}

// ── M6: FIRE ──────────────────────────────────────────────────────
var PS6=['Pull — ดึงสลักออก 📌','Aim — เล็งหัวฉีดที่ฐานไฟ 🎯','Squeeze — บีบด้ามจับ 🤜','Sweep — กวาดจากฐานไฟ 💨'];
function m6(){
  window._f6={step:0,no:[false,false,false]};
  return '<div class="scene" id="f6sc">'+
    '<div class="fire-box">🔥 ไฟขนาดเล็กที่ถังขยะ!</div>'+
    '<div class="msg">🤖 ใช้ถังดับเพลิงแบบ <b>PASS</b>! กดตามลำดับ</div>'+
    '<div class="slist">'+PS6.map(function(s,i){return '<button class="ss '+(i===0?'nxt':'lk')+'" id="ps'+i+'" onclick="f6pass('+i+')"><span class="step-n">'+(i+1)+'</span>'+s+'</button>';}).join('')+'</div>'+
  '</div>';
}
function f6pass(i){
  if(i!==window._f6.step)return;
  var e=document.getElementById('ps'+i);e.classList.remove('nxt');e.classList.add('dn');
  e.textContent=e.textContent+' ✅';
  window._f6.step++;
  if(window._f6.step<4){
    var n=document.getElementById('ps'+window._f6.step);
    n.classList.remove('lk');n.classList.add('nxt');
  }else{
    setTimeout(function(){
      document.getElementById('f6sc').innerHTML=
        '<div class="fire-alert">🚨 สัญญาณเพลิงไหม้! ไฟลุกลาม — อพยพด่วน!</div>'+
        '<div class="msg">🤖 พาทุกคนออกทาง EXIT ให้ครบ 3 คน!</div>'+
        '<div id="f6tm"><div class="tmr-box" id="tmr-display">60s</div></div>'+
        ['👩 ผู้หญิง','👴 ผู้สูงอายุ','👦 เด็ก'].map(function(n,i){return '<button class="nevac" id="ne'+i+'" onclick="f6evac('+i+')">'+n+' ⚡ นำออก EXIT</button>';}).join('')+
        '<div class="exit-sign">🚪 EXIT ฉุกเฉิน →→→</div>';
      startTimer(60,function(){
        var out=window._f6.no.filter(Boolean).length;
        levelComplete(2,out>=3);
      });
    },500);
  }
}
function f6evac(i){
  window._f6.no[i]=true;
  var e=document.getElementById('ne'+i);e.classList.add('out');
  e.textContent=e.textContent.replace('⚡ นำออก EXIT','✅ ออกแล้ว');
  if(window._f6.no.every(Boolean)){stopTimer();levelComplete(2,true);}
}

// ── M7: CPR ───────────────────────────────────────────────────────
var CS7=['เช็คการตอบสนอง — สะกิดถาม 👋','โทร 1554 ขอ AED 📞','กดหน้าอก 30 ครั้ง (100-120/นาที) 💗','เป่าปาก 2 ครั้ง 💨'];
var AS7=['หยิบ AED จากผนัง 🏥','เปิดเครื่อง AED 🔌','ติดแผ่น Pads ตามรูป 📋','กดปุ่ม Shock ตามเสียง ⚡'];
function m7(){
  window._m7={step:0,rep:0,aedStep:0,phase:'cpr'};
  return '<div class="scene" id="m7sc">'+
    '<div class="patient">🧍 ผู้ป่วยหมดสติ!</div>'+
    '<div class="msg">🤖 <b>Safety Bot:</b> ทำตามขั้นตอน CPR!</div>'+
    '<div class="slist" id="m7list">'+
      CS7.map(function(s,i){
        if(i===2)return '<button class="ss '+(i===0?'nxt':'lk')+'" id="cs'+i+'" onclick="m7do('+i+')"><span class="step-n">'+(i+1)+'</span>'+s+' (<span id="m7rep">0</span>/30)</button>';
        return '<button class="ss '+(i===0?'nxt':'lk')+'" id="cs'+i+'" onclick="m7do('+i+')"><span class="step-n">'+(i+1)+'</span>'+s+'</button>';
      }).join('')+
    '</div>'+
    '<div id="m7bw" style="display:none"><div class="cpr-prog-wrap"><div class="cpr-prog" id="m7bar" style="width:0%"></div></div></div>'+
    '<div id="m7nxt"></div>'+
  '</div>';
}
function m7do(i){
  if(i!==window._m7.step)return;
  if(i===2){
    window._m7.rep=Math.min(window._m7.rep+10,30);
    document.getElementById('m7rep').textContent=window._m7.rep;
    document.getElementById('m7bw').style.display='';
    document.getElementById('m7bar').style.width=(window._m7.rep/30*100)+'%';
    if(window._m7.rep>=30){
      var e=document.getElementById('cs2');e.classList.remove('nxt');e.classList.add('dn');
      window._m7.step=3;
      var n=document.getElementById('cs3');n.classList.remove('lk');n.classList.add('nxt');
    }
    return;
  }
  var el=document.getElementById('cs'+i);el.classList.remove('nxt');el.classList.add('dn');
  window._m7.step++;
  if(window._m7.step<CS7.length){
    document.getElementById('cs'+window._m7.step).classList.remove('lk');
    document.getElementById('cs'+window._m7.step).classList.add('nxt');
  }else{
    document.getElementById('m7nxt').innerHTML='<button class="btn" onclick="m7aed()">✅ CPR สำเร็จ → ใช้ AED</button>';
  }
}
function m7aed(){
  document.getElementById('m7sc').innerHTML=
    '<div class="patient">⚡ ใช้ AED!</div>'+
    '<div class="msg">🤖 ใช้ AED ตามลำดับ!</div>'+
    '<div class="slist">'+AS7.map(function(s,i){return '<button class="ss '+(i===0?'nxt':'lk')+'" id="as'+i+'" onclick="m7daed('+i+')"><span class="step-n">'+(i+1)+'</span>'+s+'</button>';}).join('')+'</div>';
}
function m7daed(i){
  if(i!==window._m7.aedStep)return;
  var e=document.getElementById('as'+i);e.classList.remove('nxt');e.classList.add('dn');
  e.textContent=e.textContent+' ✅';
  window._m7.aedStep++;
  if(window._m7.aedStep<AS7.length){
    document.getElementById('as'+window._m7.aedStep).classList.remove('lk');
    document.getElementById('as'+window._m7.aedStep).classList.add('nxt');
  }else{levelComplete(1,true);}
}

// ── M8: DISASTER ──────────────────────────────────────────────────
var DCH8=['DROP — หมอบลงพื้น ⬇️','COVER — คลุมหัวใต้โต๊ะ 🛡️','HOLD — ยึดจนสั่นหยุด ✊'];
var DS8=[{t:'แผ่นดินไหว 🌍',a:'Drop-Cover-Hold ใต้โต๊ะ'},{t:'น้ำท่วม 🌊',a:'ขึ้นที่สูง หนีออกจากพื้นที่'},{t:'ไฟป่า 🌲🔥',a:'ปิดจมูก เดินลุ่มๆ ออกทางลม'},{t:'พายุ 🌀',a:'เข้าอาคารแข็งแรง ออกจากต้นไม้'}];
function m8(){
  window._m8={step:0,sa:Array(4).fill(null)};
  return '<div class="scene" id="m8sc">'+
    '<div class="shake-box">⚡ แผ่นดินไหว! สั่นสะเทือน!</div>'+
    '<div class="msg">🤖 ทำท่า Drop-Cover-Hold ตามลำดับ!</div>'+
    '<div class="dch-display">'+
      '<div class="dch-ic" id="dchi">⬇️</div>'+
      '<div class="dch-lb" id="dchl">'+DCH8[0]+'</div>'+
      '<div class="dch-dots">'+DCH8.map(function(_,i){return '<div class="dch-dot '+(i===0?'a':'')+'" id="dd'+i+'"></div>';}).join('')+'</div>'+
    '</div>'+
    '<button class="btn" id="dchbtn" onclick="m8dch()">✅ ทำ '+DCH8[0]+'</button>'+
  '</div>';
}
function m8dch(){
  window._m8.step++;
  if(window._m8.step<3){
    var icons=['⬇️','🛡️','✊'];
    document.getElementById('dchi').textContent=icons[window._m8.step];
    document.getElementById('dchl').textContent=DCH8[window._m8.step];
    document.getElementById('dchbtn').textContent='✅ ทำ '+DCH8[window._m8.step];
    for(var i=0;i<3;i++)document.getElementById('dd'+i).classList.toggle('a',i<=window._m8.step);
  }else{
    document.getElementById('m8sc').innerHTML=
      '<div class="msg">🤖 จับคู่ภัยพิบัติกับวิธีรับมือ!</div>'+
      '<div class="sign-list">'+DS8.map(function(s,i){return '<div class="sign-row"><div class="sign-sym">'+s.t+'</div><select class="sign-sel" id="ds'+i+'" onchange="m8ans('+i+',this.value)"><option value="">เลือกวิธีรับมือ...</option>'+DS8.map(function(d,j){return '<option value="'+j+'">'+d.a+'</option>';}).join('')+'</select></div>';}).join('')+'</div>'+
      '<button class="btn" onclick="m8submit()">✅ ยืนยัน</button>';
  }
}
function m8ans(i,v){window._m8.sa[i]=v===''?null:Number(v);}
function m8submit(){var c=window._m8.sa.filter(function(a,i){return a===i;}).length;levelComplete(1,c>=3);}

// ── M9: QUIZ ──────────────────────────────────────────────────────
function m9(){
  window._m9={cur:0,ans:Array(9).fill(null)};
  document.getElementById('mw').innerHTML=renderQ(0);
  return '';
}
function renderQ(c){
  var q=QUIZ_DATA[c];
  return '<div class="scene" id="qsc">'+
    '<div class="q-hdr"><span class="q-prog">ข้อ '+(c+1)+' / 9</span><span style="color:var(--dim2);font-size:11px">ครอบคลุมทุกด่าน</span></div>'+
    '<div class="q-q">'+q.q+'</div>'+
    '<div class="q-chs">'+q.ch.map(function(ch,i){return '<button class="q-ch" id="qc'+i+'" onclick="qans('+i+')"><span class="q-let">'+['A','B','C','D'][i]+'</span>'+ch+'</button>';}).join('')+'</div>'+
    '<div id="qexp"></div>'+
  '</div>';
}
function qans(i){
  var q=QUIZ_DATA[window._m9.cur];
  window._m9.ans[window._m9.cur]=i;
  document.querySelectorAll('.q-ch').forEach(function(e,j){
    e.disabled=true;
    if(j===q.a)e.classList.add('ok');
    else if(j===i&&i!==q.a)e.classList.add('no');
  });
  document.getElementById('qexp').innerHTML='<div class="q-exp"><b>💡 เฉลย:</b> '+q.e+'<button class="btn-next" onclick="qnext()">'+(window._m9.cur<8?'→ ข้อถัดไป':'🎓 ส่งคำตอบ')+'</button></div>';
}
function qnext(){
  window._m9.cur++;
  if(window._m9.cur<9){
    document.getElementById('mw').innerHTML=renderQ(window._m9.cur);
  }else{
    var c=window._m9.ans.filter(function(a,i){return a===QUIZ_DATA[i].a;}).length;
    var s=c>=9?3:c>=8?2:c>=7?1:0;
    levelComplete(s,c>=7);
  }
}

// ════════════════════════════════════════════════════════════════
// COMPLETE SCREEN
// ════════════════════════════════════════════════════════════════
function renderComplete(){
  var r=S.lastResult;
  var lv=LEVELS[r.levelId];
  var f=lv.floor;
  var ids=f===1?FLOOR1_IDS:FLOOR2_IDS;
  var idx=ids.indexOf(r.levelId);
  var nextId=idx<ids.length-1?ids[idx+1]:null;
  var fDone=floorDone(f);
  var fTotal=f===1?5:4;

  var actions='';
  if(!r.passed){
    actions='<button class="btn" onclick="playLevel('+r.levelId+')">🔄 ลองใหม่</button>'+
             '<button class="btn-sec" onclick="S.view=\'MAP\';render()">🗺️ กลับแผนที่</button>';
  }else{
    if(nextId&&!S.done.has(nextId))actions='<button class="btn" onclick="playLevel('+nextId+')">→ ด่านถัดไป: '+LEVELS[nextId].icon+' '+LEVELS[nextId].title+'</button>';
    actions+='<button class="btn-sec" onclick="S.view=\'MAP\';render()">🗺️ กลับแผนที่</button>';
    if(f===1&&fDone>=5){
      actions+='<button class="btn-gold" onclick="goFloor(2)">🚆 ไปชั้น 2 — Advanced Safety</button>';
    }
  }

  return '<div class="screen" style="background:var(--bg)">'+
    '<div class="result-screen">'+
      '<div class="res-msc">'+(r.passed?'🤖 ✨':'🤖 😓')+'</div>'+
      '<div class="res-title" style="color:'+(r.passed?'var(--teal)':'var(--red)')+'">'+
        (r.passed?'ผ่านด่าน '+r.levelId+' แล้ว!':'ไม่ผ่าน...')+
      '</div>'+
      (r.passed?'<div class="res-stars">'+Array(r.stars).fill('⭐').join('')+'</div>':'')+
      '<div class="res-name">'+lv.icon+' '+lv.title+'</div>'+
      '<div class="res-prog">ผ่านแล้ว '+fDone+'/'+fTotal+' ด่าน (ชั้น '+f+')</div>'+
      (r.passed&&fDone===5&&f===1?
        '<div class="floor-complete"><h3>🎁 ผ่านชั้น 1 ครบแล้ว!</h3><p>รับรางวัลกลางที่เคาน์เตอร์<br>แล้วไปท้าทายชั้น 2!</p></div>':'')+
      (r.passed&&fDone===4&&f===2?
        '<div class="floor-complete" style="border-color:var(--gold)"><h3>🏆 ผ่านชั้น 2 ครบแล้ว!</h3><p>ยินดีด้วย! รับรางวัลพิเศษ<br>ที่เคาน์เตอร์ Safety Week!</p></div>':'')+
      '<div class="res-actions">'+actions+'</div>'+
    '</div>'+
  '</div>';
}

// ════════════════════════════════════════════════════════════════
// FINAL SCREEN
// ════════════════════════════════════════════════════════════════
function renderFinal(){
  var ts=totalStars();
  var stars=Array(Math.min(ts,15)).fill('⭐').join('');
  return '<div class="screen final-screen">'+
    '<div class="final-trophy">🏆</div>'+
    '<div class="final-title">ครบ 9 ด่าน!</div>'+
    '<div class="final-stars">'+stars+'</div>'+
    '<p style="font-size:14px;color:var(--dim)">รวมทั้ง 2 ชั้น</p>'+
    '<div class="final-total">'+ts+' / 15 ดาว</div>'+
    '<p class="final-desc">🎉 ยินดีด้วย! คุณผ่านการฝึกความปลอดภัยบนรถไฟฟ้าครบทุกด่านแล้ว</p>'+
    '<div class="reward-cards">'+
      '<div class="rcard"><div class="rcard-ic">🎁</div><div class="rcard-t">รางวัลกลาง</div><div class="rcard-s">ผ่านครบ<br>ชั้น 1 (5 ด่าน)</div></div>'+
      '<div class="rcard"><div class="rcard-ic">🏆</div><div class="rcard-t">รางวัลพิเศษ</div><div class="rcard-s">ผ่านครบ<br>ทั้ง 2 ชั้น</div></div>'+
    '</div>'+
    '<div style="display:flex;flex-direction:column;gap:8px;width:100%;max-width:300px">'+
      '<button class="btn-gold" onclick="S.view=\'LOBBY\';render()">🏠 กลับหน้าหลัก</button>'+
      '<button class="btn-sec" onclick="S.view=\'MAP\';render()">🗺️ ดูแผนที่</button>'+
    '</div>'+
  '</div>';
}

// ════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════
render();
</script>
